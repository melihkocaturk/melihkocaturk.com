---
layout: default
title: Etiketler
---

<h1>{{page.title}}</h1>

<p class="mb-5">
    {% for tag in site.tags %}
        <a href="#{{ tag[0] }}">{{ tag[0] }}</a>{% unless forloop.last %} {% endunless %}
    {% endfor %}
</p>

{% for tag in site.tags %}
    <h2 id="{{ tag[0] }}">{{ tag[0] }}</h2>
    <ul>
        {% for post in tag[1] %}
            <li><a href="{{ post.url }}">{{ post.title }}</a></li>
        {% endfor %}
    </ul>
{% endfor %}
